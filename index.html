<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omaixe — Personal Execution System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0d0d1a;
      --surface: #13132a;
      --card: #1a1a30;
      --card2: #22223a;
      --border: #2e2e4a;
      --border2: #3e3e5a;
      --accent: #7c3aed;
      --accent-l: #a78bfa;
      --accent-glow: rgba(124, 58, 237, .25);
      --text: #f0f0ff;
      --text2: #c8c8e8;
      --text3: #9898b8;
      --text4: #6868a0;
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --info: #06b6d4;
      --orange: #f97316;
      --font-display: 'Roboto', sans-serif;
      --font: 'Roboto', sans-serif;
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155
    }

    button {
      font-family: var(--font);
      border: none;
      cursor: pointer
    }

    input,
    select,
    textarea {
      font-family: var(--font)
    }

    a {
      color: inherit;
      text-decoration: none
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 10
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      height: 100vh
    }

    /* ── SIDEBAR ── */
    .sb-brand {
      padding: 22px 18px 16px;
      border-bottom: 1px solid var(--border)
    }

    .sb-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%
    }

    .sb-bolt {
      width: 100%;
      max-width: 180px;
      height: auto;
      border-radius: 9px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1)
    }

    .sb-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .16em;
      color: var(--text)
    }

    .sb-tagline {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
      letter-spacing: .05em
    }

    .sb-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent;
      user-select: none;
      width: 100%
    }

    .nav-item:hover {
      color: var(--text2);
      background: rgba(255, 255, 255, .03)
    }

    .nav-item.active {
      color: #c4b5fd;
      background: rgba(124, 58, 237, .12);
      border-color: rgba(124, 58, 237, .2)
    }

    .nav-item .ni-label {
      flex: 1
    }

    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      padding: 0 6px;
      min-width: 18px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .sb-footer {
      padding: 12px 10px;
      border-top: 1px solid var(--border)
    }

    .sb-mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px
    }

    .sb-mini-stat {
      background: var(--card2);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center
    }

    .sb-mini-val {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-l)
    }

    .sb-mini-lbl {
      font-size: 10px;
      color: var(--text3);
      margin-top: 1px
    }

    .sb-date {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      margin-top: 10px
    }

    /* ── PAGE SHELL ── */
    .page {
      padding: 28px 28px 48px;
      max-width: 1180px
    }

    .ph {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap
    }

    .ph-left {}

    .ph-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2
    }

    .ph-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 3px
    }

    .ph-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border: none;
      font-family: var(--font);
      white-space: nowrap
    }

    .btn-primary {
      background: var(--accent);
      color: #fff
    }

    .btn-primary:hover {
      background: var(--accent-l);
      box-shadow: 0 4px 20px var(--accent-glow)
    }

    .btn-ghost {
      background: rgba(255, 255, 255, .05);
      color: var(--text2);
      border: 1px solid var(--border2)
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .08)
    }

    .btn-danger {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, .2)
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, .25)
    }

    .btn-success {
      background: rgba(16, 185, 129, .15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, .2)
    }

    .btn-sm {
      padding: 5px 11px;
      font-size: 12px
    }

    .btn-xs {
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 6px
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .05);
      color: var(--text3);
      border: 1px solid var(--border)
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, .1);
      color: var(--text2)
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden
    }

    .card-p {
      padding: 16px
    }

    .card-overdue {
      border-color: rgba(239, 68, 68, .25) !important;
      background: rgba(239, 68, 68, .02) !important
    }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s
    }

    .kpi:hover {
      border-color: var(--border2)
    }

    .kpi::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 80px;
      border-radius: 0 14px 0 80px;
      opacity: .06
    }

    .kpi-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px
    }

    .kpi-val {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      color: var(--text)
    }

    .kpi-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-top: 4px
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap
    }

    .b-critical {
      background: rgba(239, 68, 68, .12);
      color: #f87171
    }

    .b-high {
      background: rgba(249, 115, 22, .12);
      color: #fb923c
    }

    .b-medium {
      background: rgba(234, 179, 8, .12);
      color: #fbbf24
    }

    .b-low {
      background: rgba(34, 197, 94, .12);
      color: #4ade80
    }

    .b-not_started {
      background: rgba(71, 85, 105, .15);
      color: #94a3b8
    }

    .b-in_progress {
      background: rgba(124, 58, 237, .15);
      color: #a78bfa
    }

    .b-completed {
      background: rgba(16, 185, 129, .15);
      color: #34d399
    }

    .b-on_hold {
      background: rgba(245, 158, 11, .15);
      color: #fbbf24
    }

    .b-cancelled {
      background: rgba(71, 85, 105, .15);
      color: #64748b
    }

    .b-overdue {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, .25)
    }

    /* ── PROGRESS ── */
    .pbar-wrap {
      width: 100%;
      background: #1a1a2e;
      border-radius: 999px;
      overflow: hidden
    }

    .pbar-fill {
      border-radius: 999px;
      transition: width .6s ease
    }

    /* SVG Ring */
    .ring-svg {}

    /* ── FORMS ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .fl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .inp {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color .15s
    }

    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow)
    }

    .inp::placeholder {
      color: var(--text3)
    }

    select.inp {
      cursor: pointer
    }

    select.inp option {
      background: #111827
    }

    textarea.inp {
      resize: vertical;
      min-height: 72px;
      line-height: 1.5
    }

    input[type=range].inp {
      padding: 4px 0;
      background: transparent;
      border: none;
      box-shadow: none
    }

    input[type=range].inp:focus {
      border: none;
      box-shadow: none
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      width: 100%
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow)
    }

    .range-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-l);
      min-width: 38px;
      text-align: right
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .8);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      transition: opacity .2s
    }

    .modal-backdrop.show {
      opacity: 1
    }

    .modal-box {
      background: #0c0c1e;
      border: 1px solid var(--border2);
      border-radius: 18px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(124, 58, 237, .08);
      transform: translateY(16px);
      transition: transform .2s
    }

    .modal-backdrop.show .modal-box {
      transform: translateY(0)
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: #0c0c1e;
      z-index: 1
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text)
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px
    }

    /* ── ITEM CARDS (Goals/Tasks) ── */
    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 13px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .2s
    }

    .item:hover {
      border-color: var(--border2)
    }

    .item.overdue {
      border-color: rgba(239, 68, 68, .22) !important
    }

    .item-head {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer
    }

    .item-main {
      flex: 1;
      min-width: 0
    }

    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35
    }

    .item-title.done {
      text-decoration: line-through;
      color: var(--text3)
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin-top: 7px
    }

    .item-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      margin-top: 2px
    }

    .item-pbar {
      padding: 0 16px 12px
    }

    .item-expand {
      border-top: 1px solid var(--border);
      background: var(--surface)
    }

    .item-expand-inner {
      padding: 14px 16px
    }

    .expand-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      font-size: 11px;
      color: var(--text3);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color .15s;
      text-align: left
    }

    .expand-toggle:hover {
      color: var(--text2)
    }

    /* ── SUBTASKS ── */
    .sub-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px
    }

    .sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--card2);
      border-radius: 8px;
      border: 1px solid var(--border)
    }

    .check-box {
      width: 17px;
      height: 17px;
      border-radius: 5px;
      border: 1.5px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .15s;
      background: transparent
    }

    .check-box.checked {
      background: var(--success);
      border-color: var(--success)
    }

    .sub-label {
      flex: 1;
      font-size: 12px;
      color: var(--text2)
    }

    .sub-label.done {
      text-decoration: line-through;
      color: var(--text3)
    }

    .sub-delete {
      opacity: .4;
      transition: opacity .15s;
      cursor: pointer;
      padding: 2px
    }

    .sub-delete:hover {
      opacity: .8
    }

    .add-sub-row {
      display: flex;
      gap: 6px;
      margin-top: 6px
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      align-items: center
    }

    .search-wrap {
      position: relative;
      min-width: 200px;
      flex: 1
    }

    .search-ico {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .4;
      pointer-events: none
    }

    .search-inp {
      padding-left: 32px !important
    }

    .filter-sel {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 9px;
      padding: 8px 11px;
      font-size: 12px;
      color: var(--text2);
      outline: none;
      cursor: pointer;
      transition: border-color .15s
    }

    .filter-sel:focus {
      border-color: var(--accent)
    }

    .filter-sel option {
      background: #111827
    }

    .filter-clear {
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border)
    }

    .filter-clear:hover {
      color: var(--text2)
    }

    /* ── ANALYTICS ── */
    .chart-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 130px
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1
    }

    .bar-fill {
      width: 100%;
      border-radius: 5px 5px 0 0;
      transition: height .5s ease;
      min-height: 2px;
      position: relative
    }

    .bar-fill:hover {
      opacity: .85;
      filter: brightness(1.1)
    }

    .bar-lbl {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      line-height: 1.2
    }

    .bar-val {
      font-size: 10px;
      font-weight: 600;
      color: var(--text2)
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 20px
    }

    .donut-legend {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2)
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0
    }

    /* ── REFLECTION NOTES ── */
    .ref-box {
      background: rgba(124, 58, 237, .05);
      border-left: 2px solid rgba(124, 58, 237, .4);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      margin-top: 8px
    }

    .ref-text {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.6;
      font-style: italic
    }

    /* ── SECTION HEADS ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 7px
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0
    }

    /* ── OVERDUE ALERT ── */
    .alert-card {
      background: rgba(239, 68, 68, .04);
      border: 1px solid rgba(239, 68, 68, .18);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px
    }

    .alert-head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #f87171;
      margin-bottom: 10px
    }

    /* ── SETTINGS ── */
    .cat-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--card2);
      border-radius: 9px;
      margin-bottom: 6px;
      border: 1px solid var(--border)
    }

      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0
    }

    /* ── EMPTY STATE ── */

      padding: 60px 20px;
      color: var(--text3)
    }

    .empty-icon {
      margin: 0 auto 14px;
      opacity: .2
    }

    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px
    }

    .empty-sub {
      font-size: 12px
    }

    /* ── DEADLINE TAGS ── */
    .dl-ok {
      font-size: 11px;
      color: var(--text3)
    }

    .dl-soon {
      font-size: 11px;
      color: var(--warn)
    }

    .dl-overdue {
      font-size: 11px;
      color: var(--danger);
      font-weight: 600
    }

    /* ── GOAL PROGRESS SECTION ── */
    .goal-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border)
    }

    .goal-row:last-child {
      border-bottom: none
    }

    .goal-row-name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .goal-row-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-l);
      min-width: 36px;
      text-align: right
    }

    /* ── TABS ── */
    .tab-row {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 18px;
      width: fit-content

    .tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text3);
      transition: all .15s

      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .3)

      display: inline-flex;
      align-items: center;
      justify-content: center

      position: absolute;
      text-align: center

        left: 0;

      z-index: 90

      right: 0;

      align-items: center;
      gap: 12px

    .btn-export {

      border-radius: 9px;

      position: relative;
      overflow: hidden;
      letter-spacing: .02em;
    }

    .btn-export::before {
      content: '';

      background: linear-gradient(135deg, rgba(255, 255, 255, .08), transparent);
      pointer-events: none;
    }

    }

    .btn-export.loading {
      opacity: .7;
      pointer-events: none
    }

    .btn-export-inline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;

    .btn-export-inline:active {
      transform: translateY(0)
    }

    /* Export toast */
    .export-toast {
      position: fixed;

      right: 24px;
      z-index: 9999;

    }

    }

      if (!d) return null;

      const t = new Date(); t.setHours(0, 0, 0, 0);
      return Math.ceil((new Date(y, m - 1, dd) - t) / 86400000);

        { id: 'g4', title: 'Personal Fitness & Wellness', description: 'Build a consistent morning workout and nutrition habit.', category: 'cat-health', priority: 'medium', status: 'in_progress', deadline: '2026-12-31', progress: 30, notes: 'Start with 30-min morning workout, track weekly.', createdAt: '2026-01-01', updatedAt: '2026-03-20' },

      try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { }
    }

    function initData() {
      const existing = localStorage.getItem(KEYS.goals);

        G.goals = load(KEYS.goals, []);
        G.tasks = load(KEYS.tasks, []);
        G.subs = load(KEYS.subs, []);
        G.cats = load(KEYS.cats, SEED.cats);
      } else {
        G.goals = SEED.goals;
        G.tasks = SEED.tasks;
        G.subs = SEED.subs;
        G.cats = SEED.cats;
        persist();
      }
    }
    function persist() {
      save(KEYS.goals, G.goals);
      save(KEYS.tasks, G.tasks);
      save(KEYS.subs, G.subs);
      save(KEYS.cats, G.cats);
    }

    // ═══════════════════════════════════════════════════════
    //  APP STATE
    // ═══════════════════════════════════════════════════════
    let S = {
      page: 'dashboard',
      expanded: {},
      filters: { search: '', status: '', priority: '', category: '' },
      taskFilters: { search: '', status: '', priority: '', category: '', goalId: '' },
    };

    // ═══════════════════════════════════════════════════════
    //  SIDEBAR
    // ═══════════════════════════════════════════════════════
    const NAV = [
      { id: 'dashboard', label: 'Dashboard', icon: 'home' },
      { id: 'goals', label: 'Goals', icon: 'goal' },
      { id: 'tasks', label: 'Tasks', icon: 'task' },
      { id: 'analytics', label: 'Analytics', icon: 'chart' },
      { id: 'settings', label: 'Settings', icon: 'gear' },
    ];

    function renderSidebar() {
      const od = G.tasks.filter(t => isOverdue(t.deadline, t.status)).length;
      const done = G.tasks.filter(t => t.status === 'completed').length;
      const inp = G.tasks.filter(t => t.status === 'in_progress').length;

      document.getElementById('sbNav').innerHTML = NAV.map(n => `
    <button class="nav-item${S.page === n.id ? ' active' : ''}" onclick="goPage('${n.id}')">
      ${svg(ICONS[n.icon], 15)}
      <span class="ni-label">${n.label}</span>
      ${n.id === 'tasks' && od > 0 ? `<span class="nav-badge">${od}</span>` : ''}
    </button>`).join('');

      document.getElementById('sbStats').innerHTML = [
        { v: G.goals.length, l: 'Goals' },
        { v: inp, l: 'Active' },
        { v: done, l: 'Done' },
      ].map(x => `<div class="sb-mini-stat"><div class="sb-mini-val">${x.v}</div><div class="sb-mini-lbl">${x.l}</div></div>`).join('');

      document.getElementById('sbDate').textContent =
        new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function goPage(p) {
      S.page = p;
      S.expanded = {};
      closeSidebar();
      renderSidebar();
      renderPage();
    }
    function openSidebar() { document.getElementById('sidebar').classList.add('mob-open'); document.getElementById('mobOverlay').classList.add('show'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('mob-open'); document.getElementById('mobOverlay').classList.remove('show'); }

    // ═══════════════════════════════════════════════════════
    //  ATOM RENDERERS
    // ═══════════════════════════════════════════════════════
    function priBadge(p) {
      const c = PRI[p] || PRI.medium;
      return `<span class="badge ${c.cls}"><span style="width:6px;height:6px;border-radius:50%;background:${c.color};display:inline-block"></span>${c.l}</span>`;
    }
    function staBadge(s) {
      const c = STA[s] || STA.not_started;
      return `<span class="badge ${c.cls}">${c.l}</span>`;
    }
    function pbar(val, h = 4, color) {
      const col = color || (val >= 80 ? '#10b981' : val >= 50 ? '#8b5cf6' : '#f59e0b');
      return `<div class="pbar-wrap" style="height:${h}px"><div class="pbar-fill" style="height:${h}px;width:${Math.min(val, 100)}%;background:${col}"></div></div>`;
    }
    function deadlineTag(d, s) {
      if (!d) return '';
      const od = isOverdue(d, s);
      const dl = daysLeft(d);
      if (od) return `<span class="dl-overdue">${svg(ICONS.calendar, 11, '#ef4444')} ${fmtDate(d)} · Overdue</span>`;
      if (dl !== null && dl <= 7 && s !== 'completed') return `<span class="dl-soon">${svg(ICONS.calendar, 11, '#f59e0b')} ${fmtDate(d)} · ${dl}d left</span>`;
      return `<span class="dl-ok">${svg(ICONS.calendar, 11)} ${fmtDate(d)}${dl !== null && s !== 'completed' ? ` · ${dl}d` : ''}</span>`;
    }
    function catTag(id) {
      const c = G.cats.find(x => x.id === id);
      if (!c) return '';
      return `<span class="badge" style="background:${c.color}18;color:${c.color}">${svg(ICONS.tag, 10, c.color)} ${c.name}</span>`;
    }
    function ring(pct, size = 72, stroke = 5, color = '#7c3aed') {
      const r = (size - stroke) / 2, cx = size / 2, cy = size / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(pct, 100) / 100) * circ;
      const col = pct >= 80 ? '#10b981' : pct >= 50 ? '#7c3aed' : '#f59e0b';
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a2e" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset .6s ease"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#f0f4ff" font-size="${size < 70 ? 10 : 13}" font-weight="700" font-family="DM Sans,sans-serif">${pct}%</text>
  </svg>`;
    }

    // ═══════════════════════════════════════════════════════
    //  DASHBOARD
    // ═══════════════════════════════════════════════════════
    function renderDashboard() {
      const { goals, tasks } = G;
      const total = tasks.length;
      const done = tasks.filter(t => t.status === 'completed').length;
      const inp = tasks.filter(t => t.status === 'in_progress').length;
      const ns = tasks.filter(t => t.status === 'not_started').length;
      const od = tasks.filter(t => isOverdue(t.deadline, t.status));
      const avgP = total ? Math.round(tasks.reduce((a, t) => a + t.progress, 0) / total) : 0;
      const gDone = goals.filter(g => g.status === 'completed').length;
      const gInp = goals.filter(g => g.status === 'in_progress').length;
      const compRate = total ? Math.round(done / total * 100) : 0;

      const kpis = [
        { l: 'Total Goals', v: goals.length, sub: `${gDone} completed · ${gInp} active`, color: '#7c3aed', icon: 'goal' },
        { l: 'Total Tasks', v: total, sub: `${ns} not started`, color: '#06b6d4', icon: 'task' },
        { l: 'Completed', v: done, sub: `${compRate}% completion rate`, color: '#10b981', icon: 'check' },
        { l: 'In Progress', v: inp, sub: 'Currently active', color: '#f97316', icon: 'fire' },
        { l: 'Overdue', v: od.length, sub: 'Need immediate attention', color: '#ef4444', icon: 'alert' },
        { l: 'Avg Progress', v: avgP + '%', sub: 'Across all tasks', color: '#eab308', icon: 'chart' },
      ];

      // Overdue alert
      let odHtml = '';
      if (od.length > 0) {
        const items = od.slice(0, 4).map(t => {
          const goal = G.goals.find(g => g.id === t.goalId);
          const dl = daysLeft(t.deadline);
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(239,68,68,.08)">
        <span style="font-size:12px;flex:1;color:#f1f5f9">${t.title}</span>
        <span style="font-size:11px;color:#f87171">${Math.abs(dl)}d overdue</span>
        <button class="btn btn-xs" onclick="openTaskModal('${t.id}')" style="background:rgba(239,68,68,.15);color:#f87171">${svg(ICONS.edit, 11)} Fix</button>
      </div>`;
        }).join('');
        odHtml = `<div class="alert-card" style="margin-bottom:20px">
      <div class="alert-head">${svg(ICONS.alert, 15, '#ef4444')} ${od.length} Overdue Item${od.length > 1 ? 's' : ''}</div>
      ${items}
      ${od.length > 4 ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">+${od.length - 4} more overdue tasks</div>` : ''}
    </div>`;
      }

      // Goal progress rows
      const goalRows = [...goals].sort((a, b) => b.progress - a.progress).map(g => {
        const tAll = tasks.filter(t => t.goalId === g.id);
        const tDone = tAll.filter(t => t.status === 'completed').length;
        const cat = G.cats.find(c => c.id === g.category);
        const col = cat ? cat.color : '#7c3aed';
        return `<div class="goal-row">
      <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <div class="goal-row-name" title="${g.title}">${g.title}</div>
      <div style="font-size:11px;color:var(--text3);min-width:52px;text-align:right">${tDone}/${tAll.length} tasks</div>
      <div style="width:80px">${pbar(g.progress, 4, col)}</div>
      <div class="goal-row-pct">${g.progress}%</div>
    </div>`;
      }).join('');

      // Recent activity (last 5 tasks updated)
      const recent = [...tasks].sort((a, b) => b.updatedAt.localeCompare(a.updatedAt)).slice(0, 5);
      const recentHtml = recent.map(t => {
        const goal = goals.find(g => g.id === t.goalId);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:6px;height:6px;border-radius:50%;background:${PRI[t.priority]?.color || '#8b5cf6'};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</div>
        <div style="font-size:11px;color:var(--text3)">${goal ? goal.title : '—'}</div>
      </div>
      ${staBadge(t.status)}
      <div style="width:48px">${pbar(t.progress, 3)}</div>
    </div>`;
      }).join('');

      // Priority distribution bars
      const priDist = ['critical', 'high', 'medium', 'low'].map(p => ({
        p, l: PRI[p].l, color: PRI[p].color, count: tasks.filter(t => t.priority === p).length
      }));
      const maxPri = Math.max(...priDist.map(x => x.count), 1);

      document.getElementById('mainContent').innerHTML = `
  <div class="page">
    <div class="ph">
      <div class="ph-left">
        <div class="ph-title">Command Center</div>
        <div class="ph-sub">${new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
      </div>
      <div class="ph-actions">
        <button class="btn btn-ghost btn-sm" onclick="goPage('goals')">${svg(ICONS.goal)} Goals</button>
        <button class="btn-export-inline" onclick="exportToExcel()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export Excel
        </button>
        <button class="btn btn-primary" onclick="openTaskModal()">${svg(ICONS.plus)} New Task</button>
      </div>
    </div>

    ${odHtml}

    <!-- KPI Grid -->
    <div class="kpi-grid" style="margin-bottom:20px">
      ${kpis.map(k => `
        <div class="kpi" style="border-top:2px solid ${k.color}22">
          <div class="kpi-icon" style="background:${k.color}15">${svg(ICONS[k.icon], 16, k.color)}</div>
          <div class="kpi-val">${k.v}</div>
          <div class="kpi-label">${k.l}</div>
          <div class="kpi-sub">${k.sub}</div>
        </div>`).join('')}
    </div>

    <!-- Bottom Grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <!-- Goal progress -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.goal, 14, '#7c3aed')} Goal Progress</div>
        ${goalRows || '<div style="font-size:12px;color:var(--text3)">No goals yet</div>'}
        <div style="margin-top:12px">
          <button class="btn btn-ghost btn-sm" onclick="goPage('goals')" style="width:100%;justify-content:center">View All Goals ${svg(ICONS.chevron_r, 13)}</button>
        </div>
      </div>

      <!-- Priority dist -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.chart, 14, '#06b6d4')} Priority Distribution</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${priDist.map(x => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:12px;color:var(--text2)">${x.l}</span>
                <span style="font-size:12px;font-weight:600;color:${x.color}">${x.count}</span>
              </div>
              ${pbar(Math.round(x.count / maxPri * 100), 6, x.color)}
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Recent tasks -->
    <div class="chart-wrap">
      <div class="chart-title">${svg(ICONS.clock, 14, '#f59e0b')} Recent Tasks
        <button class="btn btn-ghost btn-xs" onclick="goPage('tasks')" style="margin-left:auto">View all ${svg(ICONS.chevron_r, 11)}</button>
      </div>
      ${recentHtml || '<div style="font-size:12px;color:var(--text3)">No tasks yet</div>'}
    </div>
  </div>`;
    }

    // ═══════════════════════════════════════════════════════
    //  GOALS PAGE
    // ═══════════════════════════════════════════════════════
    function renderGoals() {
      const f = S.filters;
      let list = [...G.goals];
      if (f.search) list = list.filter(g => g.title.toLowerCase().includes(f.search.toLowerCase()) || (g.description || '').toLowerCase().includes(f.search.toLowerCase()));
      if (f.status) list = list.filter(g => g.status === f.status);
      if (f.priority) list = list.filter(g => g.priority === f.priority);
      if (f.category) list = list.filter(g => g.category === f.category);

      const goalsHtml = list.length === 0 ? `
    <div class="empty-state">
      <div class="empty-icon">${svg(ICONS.goal, 48, 'var(--text3)')}</div>
      <div class="empty-title">No goals found</div>
      <div class="empty-sub">Create your first goal or adjust filters</div>
    </div>` :
        list.map(g => renderGoalCard(g)).join('');

      document.getElementById('mainContent').innerHTML = `
  <div class="page">
    <div class="ph">
      <div class="ph-left">
        <div class="ph-title">Goals</div>
        <div class="ph-sub">${G.goals.length} goals · ${G.goals.filter(g => g.status === 'completed').length} completed</div>
      </div>
      <div class="ph-actions">
        <button class="btn btn-primary" onclick="openGoalModal()">${svg(ICONS.plus)} New Goal</button>
      </div>
    </div>
    ${renderFilterBar('goals')}
    <div id="goalsList">${goalsHtml}</div>
  </div>`;
    }

    function renderGoalCard(g) {
      const tasks = G.tasks.filter(t => t.goalId === g.id);
      const done = tasks.filter(t => t.status === 'completed').length;
      const odTasks = tasks.filter(t => isOverdue(t.deadline, t.status)).length;
      const isOD = isOverdue(g.deadline, g.status);
      const exp = S.expanded['g_' + g.id];

      return `
  <div class="item${isOD ? ' overdue' : ''}" id="goal-${g.id}">
    <div class="item-head">
      <div style="flex-shrink:0;margin-top:2px">${ring(g.progress, 60, 5)}</div>
      <div class="item-main">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="item-title${g.status === 'completed' ? ' done' : ''}">${g.title}</div>
          <div class="item-actions">
            <button class="icon-btn" title="Edit" onclick="openGoalModal('${g.id}')">${svg(ICONS.edit, 13)}</button>
            <button class="icon-btn" title="Delete" onclick="deleteGoal('${g.id}')" style="color:#f87171">${svg(ICONS.trash, 13)}</button>
          </div>
        </div>
        ${g.description ? `<div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${g.description}</div>` : ''}
        <div class="item-meta">
          ${staBadge(g.status)}
          ${priBadge(g.priority)}
          ${catTag(g.category)}
          ${deadlineTag(g.deadline, g.status)}
          ${isOD ? `<span class="badge b-overdue">${svg(ICONS.alert, 10, '#f87171')} Overdue</span>` : ''}
          ${odTasks > 0 ? `<span class="badge" style="background:rgba(239,68,68,.08);color:#f87171;font-size:10px">${odTasks} overdue task${odTasks > 1 ? 's' : ''}</span>` : ''}
        </div>
        <div style="margin-top:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px">
            <span>Progress</span>
            <span style="font-weight:600;color:var(--text2)">${g.progress}% · ${done}/${tasks.length} tasks done</span>
          </div>
          ${pbar(g.progress, 5)}
        </div>
      </div>
    </div>
    <div>
      <button class="expand-toggle" onclick="toggleExpand('g_${g.id}')">
        ${svg(exp ? ICONS.chevron_u : ICONS.chevron_d, 13)}
        ${exp ? 'Hide' : 'Show'} tasks (${tasks.length})
        ${tasks.length > 0 ? `<span style="margin-left:auto;font-size:11px;color:var(--text3)">${done} done</span>` : ''}
      </button>
      ${exp ? `
      <div class="item-expand-inner" style="padding-bottom:14px">
        ${tasks.length === 0 ? `
          <div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">No tasks yet</div>
          <div style="text-align:center"><button class="btn btn-ghost btn-sm" onclick="openTaskModal('',{goalId:'${g.id}'})">${svg(ICONS.plus)} Add Task</button></div>
        ` : tasks.map(t => renderTaskMini(t)).join('')}
        <div style="margin-top:8px">
          <button class="btn btn-ghost btn-xs" onclick="openTaskModal('',{goalId:'${g.id}'})">${svg(ICONS.plus)} Add Task to this Goal</button>
        </div>
        ${g.notes ? `<div class="ref-box" style="margin-top:10px"><div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px">GOAL NOTES</div><div class="ref-text">${g.notes}</div></div>` : ''}
      </div>` : ''}
    </div>
  </div>`;
    }

    function renderTaskMini(t) {
      const subs = G.subs.filter(s => s.taskId === t.id);
      const subsDone = subs.filter(s => s.isCompleted).length;
      const od = isOverdue(t.deadline, t.status);
      return `
  <div style="padding:10px;background:var(--card2);border-radius:9px;margin-bottom:6px;border:1px solid var(--border)${od ? ';border-color:rgba(239,68,68,.2)' : ''}">

      <div style="flex:1;min-width:0">

          ${subs.length > 0 ? `<span style="font-size:11px;color:var(--text3)">${svg(ICONS.check, 10)} ${subsDone}/${subs.length} subtasks</span>` : ''}

    </div>
  </div>`;
    }

    // ═══════════════════════════════════════════════════════

      if (f.category) list = list.filter(t => t.category === f.category);
      if (f.goalId) list = list.filter(t => t.goalId === f.goalId);

      const od = list.filter(t => isOverdue(t.deadline, t.status)).length;

      const tasksHtml = list.length === 0 ? `
    <div class="empty-state">
      <div class="empty-icon">${svg(ICONS.task, 48, 'var(--text3)')}</div>

      <div class="empty-sub">Add your first task or clear filters</div>

        list.map(t => renderTaskCard(t)).join('');

      document.getElementById('mainContent').innerHTML = `
  <div class="page">
    <div class="ph">
      <div class="ph-left">
        <div class="ph-title">Tasks</div>
        <div class="ph-sub">${G.tasks.length} tasks · ${od} overdue</div>
      </div>
      <div class="ph-actions">
        <button class="btn btn-primary" onclick="openTaskModal()">${svg(ICONS.plus)} New Task</button>
      </div>
    </div>
    ${renderFilterBar('tasks')}
    <div id="tasksList">${tasksHtml}</div>
  </div>`;
    }

    function renderTaskCard(t) {
      const goal = G.goals.find(g => g.id === t.goalId);
      const subs = G.subs.filter(s => s.taskId === t.id);
      const sDone = subs.filter(s => s.isCompleted).length;
      const od = isOverdue(t.deadline, t.status);
      const exp = S.expanded['t_' + t.id];

      return `
  <div class="item${od ? ' overdue' : ''}" id="task-${t.id}">
    <div class="item-head">
      <div style="flex-shrink:0;margin-top:4px">${ring(t.progress, 56, 4)}</div>
      <div class="item-main">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="item-title${t.status === 'completed' ? ' done' : ''}">${t.title}</div>
          <div class="item-actions">
            <button class="icon-btn" title="Edit" onclick="openTaskModal('${t.id}')">${svg(ICONS.edit, 13)}</button>
            <button class="icon-btn" title="Delete" onclick="deleteTask('${t.id}')" style="color:#f87171">${svg(ICONS.trash, 13)}</button>

          ${priBadge(t.priority)}
          ${catTag(t.category)}
          ${goal ? `<span style="font-size:11px;color:var(--text3)">${svg(ICONS.goal, 10)} ${goal.title}</span>` : ''}
          ${deadlineTag(t.deadline, t.status)}
          ${od ? `<span class="badge b-overdue">${svg(ICONS.alert, 10, '#f87171')} Overdue</span>` : ''}
          ${subs.length > 0 ? `<span style="font-size:11px;color:var(--text3)">${svg(ICONS.check, 10)} ${sDone}/${subs.length}</span>` : ''}
          ${t.estimatedHours > 0 ? `<span style="font-size:11px;color:var(--text3)">${svg(ICONS.clock, 10)} ${t.actualHours}/${t.estimatedHours}h</span>` : ''}
        </div>
        <div style="margin-top:9px">
          ${pbar(t.progress, 4)}
        </div>
      </div>
    </div>
    <div>
      <button class="expand-toggle" onclick="toggleExpand('t_${t.id}')">
        ${svg(exp ? ICONS.chevron_u : ICONS.chevron_d, 13)}
        ${exp ? 'Collapse' : 'Expand'} details
        ${subs.length > 0 ? `<span style="margin-left:auto;font-size:11px;color:var(--text3)">${sDone}/${subs.length} subtasks</span>` : ''}
      </button>
      ${exp ? renderTaskExpanded(t, subs) : ''}
    </div>
  </div>`;
    }

    function renderTaskExpanded(t, subs) {
      const subHtml = subs.map(s => `
    <div class="sub-item">
      <div class="check-box${s.isCompleted ? ' checked' : ''}" onclick="toggleSub('${s.id}')">
        ${s.isCompleted ? svg(ICONS.check, 11, '#fff', 2.5) : ''}
      </div>
      <span class="sub-label${s.isCompleted ? ' done' : ''}">${s.title}</span>
      <span class="sub-delete" onclick="deleteSub('${s.id}')">${svg(ICONS.x, 12, '#f87171')}</span>
    </div>`).join('');

      return `
  <div class="item-expand-inner">
    ${t.description ? `<div style="font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px">${t.description}</div>` : ''}

    <!-- Subtasks -->
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Subtasks / Milestones</div>
      <div class="sub-list">${subHtml}</div>
      <div class="add-sub-row">
        <input class="inp" id="sub-inp-${t.id}" placeholder="Add subtask…" style="font-size:12px" onkeydown="if(event.key==='Enter')addSub('${t.id}')"/>
        <button class="btn btn-ghost btn-sm" onclick="addSub('${t.id}')">${svg(ICONS.plus)}</button>
      </div>
    </div>

    <!-- Reflection note -->
    ${t.reflectionNote ? `
    <div class="ref-box">
      <div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:5px">${svg(ICONS.note, 10, 'var(--text3)')} REFLECTION NOTE</div>
      <div class="ref-text">${t.reflectionNote}</div>
    </div>` : ''}
  </div>`;
    }

    // ═══════════════════════════════════════════════════════
    //  FILTER BAR
    // ═══════════════════════════════════════════════════════
    function renderFilterBar(type) {
      const f = type === 'goals' ? S.filters : S.taskFilters;
      const catOpts = G.cats.map(c => `<option value="${c.id}"${f.category === c.id ? ' selected' : ''}>${c.name}</option>`).join('');
      const goalOpts = type === 'tasks' ? G.goals.map(g => `<option value="${g.id}"${f.goalId === g.id ? ' selected' : ''}>${g.title.slice(0, 30)}</option>`).join('') : '';
      const hasFilter = Object.values(f).some(v => v !== '');

      return `
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-ico">${svg(ICONS.search, 14)}</span>
      <input class="inp search-inp" placeholder="Search ${type}…" value="${f.search}" oninput="updateFilter('${type}','search',this.value)" style="font-size:13px"/>
    </div>
    <select class="filter-sel" onchange="updateFilter('${type}','status',this.value)">
      <option value="">All Status</option>
      ${Object.entries(STA).map(([k, v]) => `<option value="${k}"${f.status === k ? ' selected' : ''}>${v.l}</option>`).join('')}
    </select>
    <select class="filter-sel" onchange="updateFilter('${type}','priority',this.value)">
      <option value="">All Priority</option>
      ${Object.entries(PRI).map(([k, v]) => `<option value="${k}"${f.priority === k ? ' selected' : ''}>${v.l}</option>`).join('')}
    </select>
    <select class="filter-sel" onchange="updateFilter('${type}','category',this.value)">
      <option value="">All Categories</option>
      ${catOpts}
    </select>
    ${type === 'tasks' ? `
    <select class="filter-sel" onchange="updateFilter('tasks','goalId',this.value)">
      <option value="">All Goals</option>
      ${goalOpts}
    </select>`: ''}
    ${hasFilter ? `<button class="filter-clear" onclick="clearFilters('${type}')">${svg(ICONS.x, 11)} Clear</button>` : ''}
  </div>`;
    }

    function updateFilter(type, key, val) {
      if (type === 'goals') S.filters[key] = val;
      else S.taskFilters[key] = val;
      renderPage();
    }
    function clearFilters(type) {
      if (type === 'goals') S.filters = { search: '', status: '', priority: '', category: '' };
      else S.taskFilters = { search: '', status: '', priority: '', category: '', goalId: '' };
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  ANALYTICS PAGE
    // ═══════════════════════════════════════════════════════
    function renderAnalytics() {
      const { goals, tasks } = G;

      // Status breakdown
      const statBreak = Object.entries(STA).map(([k, v]) => ({
        k, l: v.l, count: tasks.filter(t => t.status === k).length, color: {
          not_started: '#64748b', in_progress: '#8b5cf6', completed: '#10b981', on_hold: '#f59e0b', cancelled: '#374151'
        }[k]
      })).filter(x => x.count > 0);
      const maxStat = Math.max(...statBreak.map(x => x.count), 1);

      // Priority breakdown
      const priBreak = Object.entries(PRI).map(([k, v]) => ({
        k, l: v.l, count: tasks.filter(t => t.priority === k).length, color: v.color
      }));
      const maxPri = Math.max(...priBreak.map(x => x.count), 1);

      // Category breakdown
      const catBreak = G.cats.map(c => ({
        name: c.name, color: c.color,
        total: tasks.filter(t => t.category === c.id).length,
        done: tasks.filter(t => t.category === c.id && t.status === 'completed').length,
      })).filter(x => x.total > 0);

      // Progress distribution
      const ranges = [{ l: '0-25%', min: 0, max: 25 }, { l: '26-50%', min: 26, max: 50 }, { l: '51-75%', min: 51, max: 75 }, { l: '76-99%', min: 76, max: 99 }, { l: '100%', min: 100, max: 100 }];
      const progDist = ranges.map(r => ({ ...r, count: tasks.filter(t => t.progress >= r.min && t.progress <= r.max).length }));
      const maxProg = Math.max(...progDist.map(x => x.count), 1);

      // KPI strip
      const total = tasks.length;
      const done = tasks.filter(t => t.status === 'completed').length;
      const avgP = total ? Math.round(tasks.reduce((a, t) => a + t.progress, 0) / total) : 0;
      const odCount = tasks.filter(t => isOverdue(t.deadline, t.status)).length;
      const estH = tasks.reduce((a, t) => a + (t.estimatedHours || 0), 0);
      const actH = tasks.reduce((a, t) => a + (t.actualHours || 0), 0);

      const kpis = [
        { l: 'Completion Rate', v: `${total ? Math.round(done / total * 100) : 0}%`, color: '#10b981' },
        { l: 'Avg Task Progress', v: `${avgP}%`, color: '#7c3aed' },
        { l: 'Overdue Rate', v: `${total ? Math.round(odCount / total * 100) : 0}%`, color: '#ef4444' },
        { l: 'Est. Hours', v: estH + 'h', color: '#06b6d4' },
        { l: 'Logged Hours', v: actH + 'h', color: '#f59e0b' },
        { l: 'Goals Active', v: goals.filter(g => g.status === 'in_progress').length, color: '#f97316' },
      ];

      // Goal table
      const goalTable = goals.map(g => {
        const tAll = tasks.filter(t => t.goalId === g.id);
        const tDone = tAll.filter(t => t.status === 'completed').length;
        const tOd = tAll.filter(t => isOverdue(t.deadline, t.status)).length;
        return `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:10px 8px;font-size:13px;color:var(--text)">${g.title}</td>
      <td style="padding:10px 8px">${staBadge(g.status)}</td>
      <td style="padding:10px 8px">${priBadge(g.priority)}</td>
      <td style="padding:10px 8px;font-size:12px;color:var(--text2)">${tDone}/${tAll.length}</td>
      <td style="padding:10px 8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:80px">${pbar(g.progress, 4)}</div>
          <span style="font-size:12px;font-weight:700;color:var(--accent-l)">${g.progress}%</span>
        </div>
      </td>
      <td style="padding:10px 8px;font-size:12px;color:${tOd > 0 ? '#f87171' : 'var(--text3)'}">${tOd > 0 ? tOd + ' overdue' : '—'}</td>
      <td style="padding:10px 8px;font-size:12px;color:var(--text3)">${fmtDate(g.deadline)}</td>
    </tr>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `
  <div class="page">
    <div class="ph">
      <div class="ph-left">
        <div class="ph-title">Analytics</div>
        <div class="ph-sub">Performance overview · ${new Date().toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}</div>
      </div>
    </div>

    <!-- KPI Strip -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      ${kpis.map(k => `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;border-left:3px solid ${k.color}">
          <div style="font-size:22px;font-weight:800;font-family:var(--font-display);color:${k.color}">${k.v}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">${k.l}</div>
        </div>`).join('')}
    </div>

    <!-- Charts Row 1 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">

      <!-- Status breakdown -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.task, 14, '#8b5cf6')} Tasks by Status</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          ${statBreak.map(x => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:12px;color:var(--text2)">${x.l}</span>
                <span style="font-size:12px;font-weight:700;color:${x.color}">${x.count}</span>
              </div>
              ${pbar(Math.round(x.count / maxStat * 100), 6, x.color)}
            </div>`).join('')}
        </div>
      </div>

      <!-- Priority breakdown -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.fire, 14, '#f97316')} Tasks by Priority</div>
        <div class="bar-chart" style="align-items:flex-end">
          ${priBreak.map(x => {
        const h = Math.round(x.count / maxPri * 100);
        return `
            <div class="bar-col">
              <div class="bar-val">${x.count}</div>
              <div class="bar-fill" style="height:${h}%;background:${x.color};width:100%;border-radius:5px 5px 0 0"></div>
              <div class="bar-lbl">${x.l}</div>
            </div>`;
      }).join('')}
        </div>
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">

      <!-- Progress distribution -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.chart, 14, '#06b6d4')} Progress Distribution</div>
        <div class="bar-chart">
          ${progDist.map(x => {
        const h = Math.round(x.count / maxProg * 100);
        const col = x.min >= 100 ? '#10b981' : x.min >= 76 ? '#22c55e' : x.min >= 51 ? '#7c3aed' : x.min >= 26 ? '#f59e0b' : '#64748b';
        return `
            <div class="bar-col">
              <div class="bar-val">${x.count}</div>
              <div class="bar-fill" style="height:${h}%;background:${col};border-radius:5px 5px 0 0"></div>
              <div class="bar-lbl">${x.l}</div>
            </div>`;
      }).join('')}
        </div>
      </div>

      <!-- Category breakdown -->
      <div class="chart-wrap">
        <div class="chart-title">${svg(ICONS.tag, 14, '#f59e0b')} Tasks by Category</div>
        ${catBreak.length === 0 ? `<div style="font-size:12px;color:var(--text3)">No categorized tasks</div>` : `
        <div style="display:flex;flex-direction:column;gap:9px">
          ${catBreak.map(x => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px">
                  <span style="width:8px;height:8px;border-radius:2px;background:${x.color};display:inline-block"></span>${x.name}
                </span>
                <span style="font-size:12px;font-weight:600;color:${x.color}">${x.done}/${x.total}</span>
              </div>
              ${pbar(x.total ? Math.round(x.done / x.total * 100) : 0, 6, x.color)}
            </div>`).join('')}
        </div>`}
      </div>
    </div>

    <!-- Goal Performance Table -->
    <div class="chart-wrap">
      <div class="chart-title">${svg(ICONS.goal, 14, '#7c3aed')} Goal Performance Table</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:1px solid var(--border)">
              ${['Goal', 'Status', 'Priority', 'Tasks', 'Progress', 'Overdue', 'Deadline'].map(h => `<th style="padding:8px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${h}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${goalTable}</tbody>
        </table>
      </div>
    </div>
  </div>`;
    }

    // ═══════════════════════════════════════════════════════
    //  SETTINGS PAGE

    </div>

    <div class="form-row">

        <label class="fl">Category</label>

        </select>
      </div>
      <div class="fg">
        <label class="fl">Deadline</label>
        <input class="inp" type="date" id="mf-deadline" value="${g?.deadline || ''}"/>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Progress: <span id="mf-pval">${g?.progress || 0}</span>%</label>
      <input type="range" min="0" max="100" value="${g?.progress || 0}" oninput="document.getElementById('mf-pval').textContent=this.value"/>
    </div>
    <div class="fg">
      <label class="fl">Notes</label>
      <textarea class="inp" id="mf-notes" placeholder="Key context, blockers, ideas…" style="min-height:60px">${g?.notes || ''}</textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

  </div>`;
      showModal();
    }

    function saveGoal(id) {
      const title = document.getElementById('mf-title').value.trim();
      if (!title) { alert('Title is required'); return; }
      const data = {
        title,
        description: document.getElementById('mf-desc').value.trim(),
        priority: document.getElementById('mf-priority').value,
        status: document.getElementById('mf-status').value,
        category: document.getElementById('mf-cat').value,
        deadline: document.getElementById('mf-deadline').value,
        progress: parseInt(document.querySelector('#modalBody input[type=range]').value),
        notes: document.getElementById('mf-notes').value.trim(),
        updatedAt: now(),
      };
      if (id) {
        const i = G.goals.findIndex(g => g.id === id);
        if (i > -1) G.goals[i] = { ...G.goals[i], ...data };
      } else {
        G.goals.push({ id: uid(), createdAt: now(), ...data });
      }
      persist();
      closeModal();
      renderPage();
    }

    function deleteGoal(id) {
      if (!confirm('Delete this goal? Associated tasks will remain but become unlinked.')) return;
      G.goals = G.goals.filter(g => g.id !== id);
      persist();
      renderPage();
    }

      <div class="fg">
        <label class="fl">Deadline</label>
        <input class="inp" type="date" id="tf-deadline" value="${t?.deadline || ''}"/>
      </div>
      <div class="fg">
        <label class="fl">Est. Hours</label>
        <input class="inp" type="number" id="tf-esthrs" min="0" value="${t?.estimatedHours || 0}" placeholder="0"/>
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label class="fl">Actual Hours Logged</label>
        <input class="inp" type="number" id="tf-acthrs" min="0" value="${t?.actualHours || 0}" placeholder="0"/>
      </div>
      <div class="fg">
        <label class="fl" style="display:flex;justify-content:space-between">Progress <span id="tf-pval">${t?.progress || 0}</span>%</label>
        <input type="range" min="0" max="100" value="${t?.progress || 0}" oninput="document.getElementById('tf-pval').textContent=this.value" style="margin-top:10px"/>
      </div>
    </div>
    <div class="fg">
      <label class="fl">${svg(ICONS.note, 11, 'var(--text3)')} Reflection Note</label>
      <textarea class="inp" id="tf-ref" placeholder="Key learnings, blockers, insights…" style="min-height:60px">${t?.reflectionNote || ''}</textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTask('${id || ''}')">${svg(ICONS.check)} ${t ? 'Save Changes' : 'Create Task'}</button>
  </div>`;
      showModal();
    }

    function saveTask(id) {
      const title = document.getElementById('tf-title').value.trim();
      if (!title) { alert('Title is required'); return; }
      const data = {
        title,
        description: document.getElementById('tf-desc').value.trim(),
        goalId: document.getElementById('tf-goal').value,
        category: document.getElementById('tf-cat').value,
        priority: document.getElementById('tf-priority').value,
        status: document.getElementById('tf-status').value,
        deadline: document.getElementById('tf-deadline').value,
        estimatedHours: parseFloat(document.getElementById('tf-esthrs').value) || 0,
        actualHours: parseFloat(document.getElementById('tf-acthrs').value) || 0,
        progress: parseInt(document.querySelector('#modalBody input[type=range]').value),
        reflectionNote: document.getElementById('tf-ref').value.trim(),
        updatedAt: now(),
      };
      if (id) {
        const i = G.tasks.findIndex(t => t.id === id);
        if (i > -1) G.tasks[i] = { ...G.tasks[i], ...data };
      } else {
        G.tasks.push({ id: uid(), createdAt: now(), ...data });
      }
      persist();
      closeModal();
      renderPage();
    }

    function deleteTask(id) {
      if (!confirm('Delete this task and all its subtasks?')) return;
      G.tasks = G.tasks.filter(t => t.id !== id);
      G.subs = G.subs.filter(s => s.taskId !== id);
      persist();
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  SUBTASKS
    // ═══════════════════════════════════════════════════════
    function toggleSub(id) {
      const i = G.subs.findIndex(s => s.id === id);
      if (i > -1) G.subs[i].isCompleted = !G.subs[i].isCompleted;
      persist();
      renderPage();
    }
    function addSub(taskId) {
      const inp = document.getElementById(`sub-inp-${taskId}`);
      if (!inp) return;
      const title = inp.value.trim();
      if (!title) return;
      G.subs.push({ id: uid(), taskId, title, isCompleted: false, createdAt: now() });
      persist();
      renderPage();
    }
    function deleteSub(id) {
      G.subs = G.subs.filter(s => s.id !== id);
      persist();
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  CATEGORIES
    // ═══════════════════════════════════════════════════════
    function openCatModal() {
      const colors = ['#7c3aed', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#f97316', '#6366f1', '#ec4899', '#14b8a6'];
      document.getElementById('modalTitle').textContent = 'New Category';
      document.getElementById('modalBody').innerHTML = `
  <div class="modal-body">
    <div class="fg"><label class="fl">Name *</label><input class="inp" id="cf-name" placeholder="e.g. Research"/></div>
    <div class="fg">
      <label class="fl">Color</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">
        ${colors.map(c => `<div onclick="selectColor('${c}')" id="csel-${c.slice(1)}" style="width:24px;height:24px;border-radius:6px;background:${c};cursor:pointer;border:2px solid transparent;transition:border-color .15s" title="${c}"></div>`).join('')}
      </div>
      <input class="inp" id="cf-color" value="#7c3aed" placeholder="#7c3aed" style="margin-top:8px"/>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveCat()">${svg(ICONS.check)} Create</button>
  </div>`;
      showModal();
      selectColor('#7c3aed');
    }

    function selectColor(c) {
      document.querySelectorAll('[id^="csel-"]').forEach(el => el.style.borderColor = 'transparent');
      const el = document.getElementById(`csel-${c.slice(1)}`);
      if (el) el.style.borderColor = '#fff';
      const inp = document.getElementById('cf-color');
      if (inp) inp.value = c;
    }

    function saveCat() {
      const name = document.getElementById('cf-name').value.trim();
      const color = document.getElementById('cf-color').value.trim() || '#7c3aed';
      if (!name) { alert('Name required'); return; }
      G.cats.push({ id: uid(), name, color });
      persist();
      closeModal();
      renderPage();
    }

    function deleteCategory(id) {
      if (!confirm('Delete this category?')) return;
      G.cats = G.cats.filter(c => c.id !== id);
      G.goals.forEach(g => { if (g.category === id) g.category = ''; });
      G.tasks.forEach(t => { if (t.category === id) t.category = ''; });
      persist();
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  DATA RESET
    // ═══════════════════════════════════════════════════════
    function resetData() {
      if (!confirm('Reset all data to sample data? This cannot be undone.')) return;
      G.goals = SEED.goals; G.tasks = SEED.tasks; G.subs = SEED.subs; G.cats = SEED.cats;
      persist();
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  EXPAND / COLLAPSE
    // ═══════════════════════════════════════════════════════
    function toggleExpand(key) {
      S.expanded[key] = !S.expanded[key];
      renderPage();
    }

    // ═══════════════════════════════════════════════════════
    //  MODAL HELPERS
    // ═══════════════════════════════════════════════════════
    function showModal() {
      const bd = document.getElementById('modalBd');
      bd.style.display = 'flex';
      requestAnimationFrame(() => bd.classList.add('show'));
    }
    function closeModal() {
      const bd = document.getElementById('modalBd');
      bd.classList.remove('show');
      setTimeout(() => { bd.style.display = 'none'; }, 200);
    }
    function handleBdClick(e) {
      if (e.target === document.getElementById('modalBd')) closeModal();
    }

    // ═══════════════════════════════════════════════════════
    //  RENDER ROUTER
    // ═══════════════════════════════════════════════════════
    function renderPage() {
      renderSidebar();
      switch (S.page) {
        case 'dashboard': renderDashboard(); break;
        case 'goals': renderGoals(); break;
        case 'tasks': renderTasks(); break;
        case 'analytics': renderAnalytics(); break;
        case 'settings': renderSettings(); break;
      }
    }

    // ═══════════════════════════════════════════════════════
    //  EXPORT TO EXCEL
    // ═══════════════════════════════════════════════════════
    function exportToExcel() {
      try {
        const btn = document.getElementById('sbExportBtn');
        if (btn) { btn.classList.add('loading'); btn.textContent = 'Exporting…'; }

        const wb = XLSX.utils.book_new();

        // ── Helper: resolve labels ──
        const priLabel = p => ({ critical: 'Critical', high: 'High', medium: 'Medium', low: 'Low' }[p] || p);
        const staLabel = s => ({ not_started: 'Not Started', in_progress: 'In Progress', completed: 'Completed', on_hold: 'On Hold', cancelled: 'Cancelled' }[s] || s);
        const catLabel = id => { const c = G.cats.find(x => x.id === id); return c ? c.name : '—'; };
        const goalLabel = id => { const g = G.goals.find(x => x.id === id); return g ? g.title : '—'; };
        const fmt = d => d ? fmtDate(d) : '—';
        const odLabel = (d, s) => isOverdue(d, s) ? 'YES' : 'No';

        // ── Sheet 1: Summary ──
        const done = G.tasks.filter(t => t.status === 'completed').length;
        const inp = G.tasks.filter(t => t.status === 'in_progress').length;
        const ns = G.tasks.filter(t => t.status === 'not_started').length;
        const od = G.tasks.filter(t => isOverdue(t.deadline, t.status)).length;
        const avgP = G.tasks.length ? Math.round(G.tasks.reduce((a, t) => a + t.progress, 0) / G.tasks.length) : 0;
        const gDone = G.goals.filter(g => g.status === 'completed').length;
        const compR = G.tasks.length ? Math.round(done / G.tasks.length * 100) : 0;
        const estH = G.tasks.reduce((a, t) => a + (t.estimatedHours || 0), 0);
        const actH = G.tasks.reduce((a, t) => a + (t.actualHours || 0), 0);
        const exportedAt = new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        const summaryData = [
          ['Omaixe — Personal Execution System'],
          [`Exported on: ${exportedAt}`],
          [''],
          ['METRIC', 'VALUE'],
          ['Total Goals', G.goals.length],
          ['Goals Completed', gDone],
          ['Goals In Progress', G.goals.filter(g => g.status === 'in_progress').length],
          ['Total Tasks', G.tasks.length],
          ['Tasks Completed', done],
          ['Tasks In Progress', inp],
          ['Tasks Not Started', ns],
          ['Overdue Tasks', od],
          ['Completion Rate', compR + '%'],
          ['Avg Task Progress', avgP + '%'],
          ['Total Subtasks', G.subs.length],
          ['Subtasks Completed', G.subs.filter(s => s.isCompleted).length],
          ['Estimated Hours (Total)', estH + 'h'],
          ['Actual Hours Logged', actH + 'h'],
          ['Categories', G.cats.length],
        ];
        const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
        wsSummary['!cols'] = [{ wch: 30 }, { wch: 22 }];
        // Style the header rows by merging A1 across 2 cols
        wsSummary['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 1 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: 1 } }];
        XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

        // ── Sheet 2: Goals ──
        const goalsRows = [
          ['Goal Title', 'Description', 'Category', 'Priority', 'Status', 'Progress %', 'Deadline', 'Overdue?', 'Total Tasks', 'Tasks Done', 'Notes', 'Created On', 'Last Updated'],
          ...G.goals.map(g => {
            const tAll = G.tasks.filter(t => t.goalId === g.id);
            const tDone = tAll.filter(t => t.status === 'completed').length;
            return [
              g.title,
              g.description || '',
              catLabel(g.category),
              priLabel(g.priority),
              staLabel(g.status),
              g.progress,
              fmt(g.deadline),
              odLabel(g.deadline, g.status),
              tAll.length,
              tDone,
              g.notes || '',
              fmt(g.createdAt),
              fmt(g.updatedAt),
            ];
          })
        ];
        const wsGoals = XLSX.utils.aoa_to_sheet(goalsRows);
        wsGoals['!cols'] = [
          { wch: 35 }, { wch: 40 }, { wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 12 },
          { wch: 16 }, { wch: 10 }, { wch: 12 }, { wch: 11 }, { wch: 40 }, { wch: 14 }, { wch: 14 },
        ];
        XLSX.utils.book_append_sheet(wb, wsGoals, 'Goals');

        // ── Sheet 3: Tasks ──
        const tasksRows = [
          ['Task Title', 'Description', 'Parent Goal', 'Category', 'Priority', 'Status', 'Progress %', 'Deadline', 'Overdue?', 'Est. Hours', 'Actual Hours', 'Subtasks Total', 'Subtasks Done', 'Reflection Note', 'Created On', 'Last Updated'],
          ...G.tasks.map(t => {
            const subs = G.subs.filter(s => s.taskId === t.id);
            const subsDone = subs.filter(s => s.isCompleted).length;
            return [
              t.title,
              t.description || '',
              goalLabel(t.goalId),
              catLabel(t.category),
              priLabel(t.priority),
              staLabel(t.status),
              t.progress,
              fmt(t.deadline),
              odLabel(t.deadline, t.status),
              t.estimatedHours || 0,
              t.actualHours || 0,
              subs.length,
              subsDone,
              t.reflectionNote || '',
              fmt(t.createdAt),
              fmt(t.updatedAt),
            ];
          })
        ];
        const wsTasks = XLSX.utils.aoa_to_sheet(tasksRows);
        wsTasks['!cols'] = [
          { wch: 35 }, { wch: 35 }, { wch: 30 }, { wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 12 },
          { wch: 16 }, { wch: 10 }, { wch: 12 }, { wch: 13 }, { wch: 15 }, { wch: 14 }, { wch: 40 }, { wch: 14 }, { wch: 14 },
        ];
        XLSX.utils.book_append_sheet(wb, wsTasks, 'Tasks');

        // ── Sheet 4: Subtasks ──
        const subsRows = [
          ['Subtask Title', 'Parent Task', 'Parent Goal', 'Completed?', 'Created On'],
          ...G.subs.map(s => {
            const task = G.tasks.find(t => t.id === s.taskId);
            return [
              s.title,
              task ? task.title : '—',
              task ? goalLabel(task.goalId) : '—',
              s.isCompleted ? 'Yes' : 'No',
              fmt(s.createdAt),
            ];
          })
        ];
        const wsSubs = XLSX.utils.aoa_to_sheet(subsRows);
        wsSubs['!cols'] = [{ wch: 38 }, { wch: 38 }, { wch: 30 }, { wch: 12 }, { wch: 14 }];
        XLSX.utils.book_append_sheet(wb, wsSubs, 'Subtasks');

        // ── Sheet 5: Categories ──
        const catsRows = [
          ['Category Name', 'Color', 'Goals Count', 'Tasks Count'],
          ...G.cats.map(c => [
            c.name,
            c.color,
            G.goals.filter(g => g.category === c.id).length,
            G.tasks.filter(t => t.category === c.id).length,
          ])
        ];
        const wsCats = XLSX.utils.aoa_to_sheet(catsRows);
        wsCats['!cols'] = [{ wch: 20 }, { wch: 12 }, { wch: 14 }, { wch: 13 }];
        XLSX.utils.book_append_sheet(wb, wsCats, 'Categories');

        // ── Download ──
        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(wb, `Omaixe_Export_${dateStr}.xlsx`);

        // ── Toast ──
        const totalItems = G.goals.length + G.tasks.length + G.subs.length;
        showExportToast(
          '✓ Export complete!',
          `${G.goals.length} goals · ${G.tasks.length} tasks · ${G.subs.length} subtasks — 5 sheets`
        );

      } catch (err) {
        console.error('Export error:', err);
        showExportToast('Export failed', 'Please try again.', true);
      } finally {
        const btn = document.getElementById('sbExportBtn');
        if (btn) {
          btn.classList.remove('loading');
          btn.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export to Excel`;
        }
      }
    }

    function showExportToast(title, sub, isError) {
      const toast = document.getElementById('exportToast');
      const tTitle = document.getElementById('toastTitle');
      const tSub = document.getElementById('toastSub');
      if (!toast) return;
      tTitle.textContent = title;
      tSub.textContent = sub;
      toast.style.borderColor = isError ? 'rgba(239,68,68,.4)' : 'rgba(16,185,129,.4)';
      toast.querySelector('.export-toast-icon').style.background = isError ? 'rgba(239,68,68,.15)' : 'rgba(16,185,129,.15)';
      toast.querySelector('svg').setAttribute('stroke', isError ? '#ef4444' : '#10b981');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ═══════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════
    initData();
    renderPage();
  </script>
</body>

</html>
